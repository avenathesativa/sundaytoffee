<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radio Button Preview</title>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --primary-brown: #7B5B3A;
    --light-text: #A38C75;
    --bg: #FDFAF7;
    --border: #E8D5C0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: #3D2B1F;
    padding: 2rem;
    max-width: 500px;
    margin: 0 auto;
  }
  h2 {
    font-size: 0.7rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--light-text);
    margin-bottom: 1.25rem;
  }
  label.field-label {
    display: block;
    font-size: 0.85rem;
    color: var(--primary-brown);
    margin-bottom: 0.6rem;
  }
  .radio-group { display: flex; flex-direction: column; gap: 0.5rem; }
  .radio-option {
    display: flex;
    align-items: flex-start;
    gap: 0.75rem;
    padding: 0.75rem 1rem;
    border: 1px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.9rem;
    background: white;
    transition: border-color 0.15s;
  }
  .radio-option:hover { border-color: var(--primary-brown); }
  .radio-option input[type="radio"] {
    margin-top: 2px;
    accent-color: var(--primary-brown);
    flex-shrink: 0;
  }
  .radio-option.flexible {
    border-style: dashed;
    background: #faf8f5;
  }
  .radio-option.flexible:hover { border-color: var(--primary-brown); }
  .sub-text {
    font-size: 0.8rem;
    color: var(--light-text);
    margin-top: 0.2rem;
    font-style: italic;
  }
  .section {
    background: white;
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.5rem;
    margin-bottom: 1.5rem;
  }
  .section-title {
    font-size: 0.7rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--light-text);
    margin-bottom: 1.25rem;
    font-weight: 500;
  }
  .note {
    font-size: 0.75rem;
    color: #999;
    margin-top: 2rem;
    text-align: center;
    font-style: italic;
  }
  .label-tag {
    font-size: 0.72rem;
    background: #f2e8de;
    color: var(--primary-brown);
    border-radius: 4px;
    padding: 1px 6px;
    margin-left: 6px;
    font-weight: 500;
    vertical-align: middle;
  }
</style>
</head>
<body>

  <p style="font-size:0.8rem; color:#999; text-align:center; margin-bottom:1.5rem; font-style:italic;">👇 Preview only — showing the pickup window section</p>

  <!-- OPTION A: text + SMS link -->
  <div class="section">
    <p class="section-title">Option A — text link <span class="label-tag">recommended</span></p>
    <label class="field-label">pickup window (Sunday, March 9)</label>
    <div class="radio-group">
      <label class="radio-option">
        <input type="radio" name="windowA" value="2PM - 3PM">
        <span>2PM – 3PM</span>
      </label>
      <label class="radio-option">
        <input type="radio" name="windowA" value="3PM - 4PM">
        <span>3PM – 4PM</span>
      </label>
      <label class="radio-option flexible">
        <input type="radio" name="windowA" value="Flexible">
        <span>
          Sunday doesn't work for me
          <div class="sub-text">I'll <a href="sms:5106217820" style="color:var(--primary-brown);">text you</a> to find another time!</div>
        </span>
      </label>
    </div>
  </div>

  <!-- OPTION B: email link -->
  <div class="section">
    <p class="section-title">Option B — email link</p>
    <label class="field-label">pickup window (Sunday, March 9)</label>
    <div class="radio-group">
      <label class="radio-option">
        <input type="radio" name="windowB" value="2PM - 3PM">
        <span>2PM – 3PM</span>
      </label>
      <label class="radio-option">
        <input type="radio" name="windowB" value="3PM - 4PM">
        <span>3PM – 4PM</span>
      </label>
      <label class="radio-option flexible">
        <input type="radio" name="windowB" value="Flexible">
        <span>
          Sunday doesn't work for me
          <div class="sub-text">I'll email <a href="mailto:orders@sundaytoffee.com" style="color:var(--primary-brown);">orders@sundaytoffee.com</a> to schedule a pickup time.</div>
        </span>
      </label>
    </div>
  </div>

  <p class="note">Both options remove the "Can't make this time? text me!" line below since it's no longer needed.</p>

</body>
</html>
